<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Music/No Copyright...</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utilites.css">
    <link rel="stylesheet" href="apple_music_logo_square_icon_134020.ico">
</head>

<body>
    <div class="container flex bgblack">
        <div class="left  ">
            <div class="cross invert">
                <img src="cross.svg" alt="">
            </div>
            <div class="home bggray rounded p-1">
                <div class="logo"><img src="webmusiclogosvg.svg" width="310px" alt="icon"></div>
                <!-- <ul>
                    <li><img src="home.svg" alt="home">Home</li>
                    <li><img src="search.svg" alt="search">Search</li>
                </ul> -->

            </div>

            <div class="library bggray m-1 rounded p-1">
                <div class="libraryhead">
                    <div class="play"><img src="playlist.png" alt="playlist" width="20px"></div>
                    Your Library
                </div>
                <div class="songnames">
                    <ul class="songlist"></ul>
                </div>
                <div class="footer">
                    <div>
                        <a href="https://www.spotify.com/in-en/legal/">
                            <span>Legal</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/in-en/safetyandprivacy/">
                            <span>Safety &amp; Privacy Center</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/in-en/legal/privacy-policy/">
                            <span>Privacy Policy</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/in-en/legal/cookies-policy/">
                            <span>Cookies</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">
                            <span>About Ads</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/in-en/accessibility/">
                            <span>Accessibility</span>
                        </a>
                    </div>
                </div>


            </div>

        </div>


        <div class="right  bggray rounded  m-1">
            <div class="header rounded">
                <div class="nav">
                    <div class="hamburger invert">
                        <img src="hamburger.svg" alt="">
                    </div>
                    <div class="direction">
                        <img src="left.svg" alt="left">
                        <img src="right.svg" alt="right">
                    </div>

                </div>
                <div class="buttons">
                    <button class="signup-btn">Sign Up</button>
                    <button class="btn-login">Log in</button>
                </div>
            </div>
            <div class="playlist">
                <h2> Music Playlists</h2>
                <div class="cardcontain">
                </div>
                <div class="volbar">
                    <div class="vol"><img class="invert" src="volume.svg" alt=""></div>
                    <div class="volup">
                        <div class="circlel invert">
                            <img src="circle-svgrepo-com.svg" width="12px" alt="">
                        </div>
                    </div>
                </div>
                <div class="playbar">
                    <div class="songinfo"></div>
                    <div class="songbutton">
                        <img id="previous" class="invert" src="previous.svg" width="20px" alt="">
                        <img id="play" class="invert" src="musicplayer.svg" width="20px" alt="">
                        <img id="next" class="invert" src="next.svg" width="20px" alt="">
                    </div>
                    <div class="playtime"></div>
                    <div class="seekbar">
                        <div class="circle invert">
                            <img src="circle-svgrepo-com.svg" width="12px" alt="">

                        </div>
                    </div>
                </div>


            </div>
        </div>
        <script src="script.js"></script>
</body>

</html
